name: Build Drasl para Linux ARM64

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch: # Permite disparar a compilação manualmente

jobs:
  build-arm64:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Configurar Go
        uses: actions/setup-go@v5
        with:
          go-version: '>=1.23'
          cache: true

      - name: Instalar compilador cruzado C/C++ para ARM64 e utilitários
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu make

      - name: Instalar dependências do Frontend
        run: npm install

      - name: 1. Gerar Assets e Swagger nativamente (AMD64)
        run: |
          # Executamos o target 'swag' sem variáveis GOOS/GOARCH de cross-compiling.
          # Isso permite que o 'swag' execute normalmente no ambiente x86_64 do GitHub Actions.
          make swag

      - name: 2. Compilar o binário final do Drasl para ARM64
        env:
          GOOS: linux
          GOARCH: arm64
          CGO_ENABLED: 1
          CC: aarch64-linux-gnu-gcc
          CXX: aarch64-linux-gnu-g++
        run: |
          # Em vez de chamar o 'make' (que tentaria reavaliar as dependências e rodar o 'swag' novamente sob ARM64),
          # compilamos o Drasl chamando diretamente o 'go build'.
          # O Go irá embutir todos os arquivos gerados nativamente no executável final de ARM64.
          go build -ldflags="-s -w" -o drasl .

      - name: Fazer upload do binário compilado
        uses: actions/upload-artifact@v4
        with:
          name: drasl-linux-arm64
          path: drasl